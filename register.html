<!DOCTYPE html>
<html>
<head>
<title>BRATOR Registration</title>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial, sans-serif;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
}

button{
    background:gold;
    padding:12px;
    border:none;
    width:100%;
    font-weight:bold;
    cursor:pointer;
}

header{
    text-align:center;
    padding:20px;
}

a{
    color:gold;
}

footer{
    text-align:center;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
<h1>⚽ Join BRATOR</h1>
<p>Register your sports talent</p>
</header>

<div class="container">

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name">

<label>Age</label>
<input type="number" placeholder="Enter your age">

<label>Sport</label>
<select>
<option>Football</option>
<option>Basketball</option>
<option>Volleyball</option>
<option>Other</option>
</select>

<label>Position / Role</label>
<input type="text" placeholder="Example: Striker, Defender, Referee">

<label>Contact</label>
<input type="text" placeholder="Phone or Email">

<button>Submit Registration</button>

</form>

<p><a href="index.html">← Back to Home</a></p>

</div>

<footer>
© 2026 BRATOR Sports Platform
</footer>

</body>
</html>
