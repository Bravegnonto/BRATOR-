<!DOCTYPE html>
<html>
<head>
<title>BRATOR Referee Registration</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial,sans-serif;
margin:0;
}
<a href="referee-register.html" class="btn primary">Register as Referee</a>
header{
background:#0f172a;
padding:30px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:gold;
border:none;
font-weight:bold;
}

.card{
background:#1e293b;
padding:20px;
margin:15px 0;
border-radius:10px;
}

a{
color:gold;
}
</style>
</head>

<body>

<header>
<h1>🟨 BRATOR Referee Hub</h1>
<p>Connecting and Developing Match Officials</p>
</header>

<div class="container">

<div class="card">
<h3>🏅 Referee Registration</h3>

<form action="https://formspree.io/f/xjgnelwa" method="POST">

<input type="text" name="Full Name" placeholder="Full Name" required>

<input type="number" name="Age" placeholder="Age" required>

<input type="text" name="Association" placeholder="Association / Region">

<select name="Level">
<option>FUFA Grade III</option>
<option>FUFA Grade II</option>
<option>FUFA Grade I</option>
<option>Regional Referee</option>
<option>District Referee</option>
<option>School Referee</option>
</select>

<input type="text" name="Contact" placeholder="Phone or Email" required>

<button type="submit">Register as Referee 🟨</button>

</form>
</div>

<div class="card">
<h3>📚 Laws of the Game</h3>
<p>Study football laws and improve officiating skills.</p>
</div>

<div class="card">
<h3>📅 Match Appointments</h3>
<p>View upcoming officiating opportunities.</p>
</div>

<div class="card">
<h3>🏃 Fitness & Development</h3>
<p>Training resources for referees.</p>
</div>

<p>
<a href="index.html">← Back to Home</a>
</p>

</div>

</body>
</html>
