<!DOCTYPE html>
<html>

<head>
<title>BRATOR Team Registration</title>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}

header{
    text-align:center;
    padding:30px;
    background:#0f172a;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
}

button{
    background:gold;
    padding:12px;
    width:100%;
    border:none;
    font-weight:bold;
}

a{
    color:gold;
}

footer{
    text-align:center;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
<h1>🏟️ Register Your Team</h1>
<p>Join the BRATOR Sports Network</p>
</header>


<div class="container">

<form action="https://formspree.io/f/xjgnelwa" method="POST">

<label>Team Name</label>
<input type="text" name="Team Name" placeholder="Enter team name" required>


<label>Sport</label>
<select name="Sport">
<option>Football</option>
<option>Basketball</option>
<option>Volleyball</option>
<option>Other</option>
</select>


<label>Location</label>
<input type="text" name="Location" placeholder="Team location" required>


<label>Captain / Manager Name</label>
<input type="text" name="Manager" placeholder="Enter captain or manager name">


<label>Contact</label>
<input type="text" name="Contact" placeholder="Phone or Email" required>


<button type="submit">Register Team 🏆</button>

</form>

<p>
<a href="index.html">← Back to Home</a>
</p>

</div>


<footer>
© 2026 BRATOR Sports Platform
</footer>

</body>

</html>
